services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quant"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  init-db:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    env_file:
      - .env
    command: python libs/core/init_db.py
    depends_on:
      postgres:
        condition: service_healthy

  market-data:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    env_file:
      - .env
    command: python apps/market_data/main.py
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
    restart: unless-stopped

  strategy-engine:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    env_file:
      - .env
    command: python apps/strategy_engine/main.py
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
    restart: unless-stopped

  monitor-engine:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    env_file:
      - .env
    command: python apps/monitor_engine/main.py
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
    restart: unless-stopped

  replay-engine:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    env_file:
      - .env
    command: python apps/replay_engine/main.py
    depends_on:
      redis:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    env_file:
      - .env
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
